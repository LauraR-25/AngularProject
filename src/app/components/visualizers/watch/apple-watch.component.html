<div class="watch-wrapper">
  <div class="apple-watch-hardware">

    <div class="strap top-strap"></div>
    <div class="strap bottom-strap"></div>

    <div class="digital-crown"></div>
    <div class="side-button"></div>

    <div class="watch-screen-display">

      <!-- ZONA SUPERIOR: Hora estirada -->
      <div class="watch-top">
        <h1 class="time-text">{{ displayTime }}</h1>
      </div>

      <!-- ZONA CENTRAL: Reproductor de música -->
      <div class="watch-music">
        <div class="music-controls">
          <button class="music-btn" type="button">⏮</button>
          <button class="music-btn music-btn-play" type="button" (click)="togglePlay()">
            {{ isPlaying ? '⏸' : '▶' }}
          </button>
          <button class="music-btn" type="button">⏭</button>
        </div>
        <div class="music-progress-track">
          <div class="music-progress-fill" [style.width.%]="progress"></div>
        </div>
      </div>

      <!-- ZONA INFERIOR: Emoji | Fecha | Barras -->
      <div class="watch-bottom">

        <!-- Izquierda: Emoji día/noche -->
        <div class="watch-emoji-area">
          <span *ngIf="!isNight" class="emoji-style">☀️</span>
          <span *ngIf="isNight" class="emoji-style">🌙</span>
        </div>

        <!-- Centro: Fecha -->
        <div class="watch-date-area">
          <span class="date-text">{{ displayDate }}</span>
        </div>

        <!-- Derecha: Barras de actividad -->
        <div class="watch-bars-area">
          <div class="activity-bar">
            <div class="bar-track">
              <div class="bar-fill bar-activity" [style.height.%]="barActivity"></div>
            </div>
            <span class="bar-label">A</span>
          </div>
          <div class="activity-bar">
            <div class="bar-track">
              <div class="bar-fill bar-exercise" [style.height.%]="barExercise"></div>
            </div>
            <span class="bar-label">E</span>
          </div>
          <div class="activity-bar">
            <div class="bar-track">
              <div class="bar-fill bar-stand" [style.height.%]="barStand"></div>
            </div>
            <span class="bar-label">S</span>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<div class="mlp-scene" [ngClass]="phase" [style.background]="skyGradient">

  <!-- ═══════════════════════════════════════════════════════════════
       CAPA1: CIELO — z-index:1 (estrellas, astros, nubes)
       ═══════════════════════════════════════════════════════════════ -->

  <!-- ESTRELLAS — puntos diminutos (1-2px) esparcidos SOLO en lateral izquierdo -->
  <div *ngIf="showStars" class="stars-layer">
    <span *ngFor="let est of estrellas; trackBy: trackByIndex"
          class="estrella-punto"
          [style.left.%]="est.cx"
          [style.top.%]="est.cy"
          [style.opacity]="est.opacidad"
          [style.width.px]="est.r > 0.5 ? 2 : 1"
          [style.height.px]="est.r > 0.5 ? 2 : 1"
          [style.animation-delay]="(est.cy * 0.1) + 's'"></span>
  </div>

  <!-- SOL — descenso vertical en lateral izquierdo -->
  <div *ngIf="sunVisible" class="astro sol"
       [style.top.%]="sunY">
    <div class="sol-cuerpo"></div>
    <div class="sol-brillo"></div>
  </div>

  <!-- LUNA — descenso vertical en lateral izquierdo -->
  <div *ngIf="moonVisible" class="astro luna"
       [style.top.%]="moonY">
    <div class="luna-cuerpo"></div>
    <div class="luna-brillo"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       CAPA2: IMÁGENES — z-index:10 (castillo y princesas por encima)
       ═══════════════════════════════════════════════════════════════ -->

  <!-- CASTILLO -->
  <div class="castle-layer">
    <img src="assets/images/mlp/canterlot.png" alt="Canterlot" class="castle-img" />
  </div>

  <!-- PRINCESAS -->
  <div class="princess-layer">
    <img src="assets/images/mlp/celestia.png"
         alt="Princesa Celestia"
         class="princess-img celestia"
         [class.visible]="showCelestia" />
    <img src="assets/images/mlp/luna.png"
         alt="Princesa Luna"
         class="princess-img luna"
         [class.visible]="showLuna" />
  </div>

  <!-- HUD -->
  <div class="hud-overlay">
    <div class="hud-badge" [ngClass]="'badge-' + phase">
      {{ phaseLabel }}
    </div>
    <div class="hud-time">{{ currentTime | date:'HH:mm:ss' }}</div>
    <div class="hud-princess">
      {{ phase === 'noche' ? '🌙 Princesa Luna' : '☀️ Princesa Celestia' }}
    </div>
  </div>
</div>

<div class="mlp-scene" [ngClass]="phase" [style.background]="skyGradient">

  <!-- ESTRELLAS (capa de fondo, solo de noche) -->
  <svg *ngIf="showStars" class="stars-layer" viewBox="0 0 100 100" preserveAspectRatio="none">
    <circle *ngFor="let est of estrellas; trackBy: trackByIndex"
            [attr.cx]="est.cx" [attr.cy]="est.cy" [attr.r]="est.r"
            fill="#ffffff" [attr.opacity]="est.opacidad" class="estrella"/>
  </svg>

  <!-- ESTRELLAS FUGACES -->
  <svg *ngIf="showStars" class="shooting-stars-layer" viewBox="0 0 100 100" preserveAspectRatio="none">
    <line *ngFor="let f of estrellasFugaces; trackBy: trackByIndex"
          [attr.x1]="f.x1" [attr.y1]="f.y1"
          [attr.x2]="f.x2" [attr.y2]="f.y2"
          stroke="#ffffff" stroke-width="0.3" stroke-linecap="round"
          class="estrella-fugaz"
          [style.animation-duration]="f.duracion + 's'"
          [style.animation-delay]="f.retraso + 's'"/>
  </svg>

  <!-- SOL (arco orbital diurno) -->
  <div *ngIf="sunVisible" class="astro sol"
       [style.left.%]="sunX"
       [style.top.%]="sunY">
    <div class="sol-cuerpo"></div>
    <div class="sol-brillo"></div>
  </div>

  <!-- LUNA (arco orbital nocturno) -->
  <div *ngIf="moonVisible" class="astro luna"
       [style.left.%]="moonX"
       [style.top.%]="moonY">
    <div class="luna-cuerpo"></div>
    <div class="luna-brillo"></div>
  </div>

  <!-- NUBES (SVG flotantes) -->
  <svg class="clouds-layer" viewBox="0 0 100 100" preserveAspectRatio="none">
    <g *ngFor="let nube of nubes; trackBy: trackByIndex"
       class="nube-grupo"
       [style.animation-delay]="(nube.cx * 0.3) + 's'"
       [attr.transform]="'translate(' + nube.cx + ',' + nube.cy + ') scale(' + nube.scale + ')'">
      <ellipse cx="0" cy="0" rx="8" ry="4" [attr.fill]="cloudColor" [attr.opacity]="nube.opacity * cloudOpacity"/>
      <ellipse cx="-5" cy="1" rx="5" ry="3" [attr.fill]="cloudColor" [attr.opacity]="nube.opacity * cloudOpacity"/>
      <ellipse cx="5" cy="0.5" rx="6" ry="3.5" [attr.fill]="cloudColor" [attr.opacity]="nube.opacity * cloudOpacity"/>
    </g>
  </svg>

  <!-- CASTILLO -->
  <div class="castle-layer">
    <img src="assets/images/mlp/canterlot.png" alt="Canterlot" class="castle-img" />
  </div>

  <!-- PRINCESAS -->
  <div class="princess-layer">
    <img src="assets/images/mlp/celestia.png"
         alt="Princesa Celestia"
         class="princess-img celestia"
         [class.visible]="showCelestia" />
    <img src="assets/images/mlp/luna.png"
         alt="Princesa Luna"
         class="princess-img luna"
         [class.visible]="showLuna" />
  </div>

  <!-- HUD -->
  <div class="hud-overlay">
    <div class="hud-badge" [ngClass]="'badge-' + phase">
      {{ phaseLabel }}
    </div>
    <div class="hud-time">{{ currentTime | date:'HH:mm:ss' }}</div>
    <div class="hud-princess">
      {{ phase === 'noche' ? '🌙 Princesa Luna' : '☀️ Princesa Celestia' }}
    </div>
  </div>
</div>
